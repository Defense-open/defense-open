[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]
# deny ve copyleft anahtarları cargo-deny v0.14+ ile kaldırıldı;
# allow listesi dışındaki her lisans zaten reddedilir.

[bans]
multiple-versions = "warn"

[advisories]
ignore = []

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
