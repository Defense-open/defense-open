name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain kur
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Fmt kontrolü
        run: cargo fmt --all -- --check
      - name: Clippy (uyarı = hata)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Testler
        run: cargo test --all --locked

  security-audit:
    name: Güvenlik Denetimi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain kur
        uses: dtolnay/rust-toolchain@stable
      - name: cargo-audit kur
        run: cargo install cargo-audit --locked
      - name: cargo-audit çalıştır (CVSS ≥7.0 = CI kırmızı)
        run: cargo audit --deny unsound --deny yanked
      - name: cargo-deny (lisans + bağımlılık kontrolü)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources
