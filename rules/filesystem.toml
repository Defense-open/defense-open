# Filesystem kuralları — 15 kural

[[rules]]
id = "FS-001"
name = "Script Created in Temp Directory"
score = 60
category = "execution"
mitre = "T1059"
recommended_action = "investigate"
match_mode = "any"
[[rules.conditions]]
field = "fs.path"
op = "contains"
value = "\\temp\\"
[[rules.conditions]]
field = "fs.path"
op = "contains"
value = "/tmp/"

